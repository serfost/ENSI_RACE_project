name: Bug report
description: Signaler un problème ou un comportement inattendu
title: "[Bug] "
labels:
  - bug

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Décris clairement le problème rencontré.
      placeholder: Que s'est-il passé ?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur ...
        2. Cliquer sur ...
        3. Observer ...

  - type: textarea
    id: expected
    attributes:
      label: Résultat attendu
      placeholder: Quel comportement attendais-tu ?

  - type: textarea
    id: additional
    attributes:
      label: Informations complémentaires
      placeholder: Captures d'écran, logs, contexte...
